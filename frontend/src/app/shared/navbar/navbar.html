@if (showNavbar()) {
  <nav class="navbar">
    <div class="navbar__container">
      <a routerLink="/items" class="navbar__brand">Lost &amp; Found</a>

<div class="navbar__auth">
        @if (loggedIn()) {
          @if (me(); as u) {
            <a routerLink="/profile" routerLinkActive="active" class="navbar__username">{{
              u.username
            }}</a>
          }
          <button type="button" class="navbar__button" (click)="onLogout()">Logout</button>
        } @else if (showLoginButton()) {
          <a routerLink="/login" class="navbar__button navbar__button--link">Login</a>
        }
      </div>
    </div>
  </nav>
}
