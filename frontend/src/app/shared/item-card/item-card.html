<div class="item-card">
  @if (item.image) {
    <img [src]="item.image" [alt]="item.title" class="item-card__image" loading="lazy" />
  }

  <div class="item-card__body">
    <div class="item-card__badges">
      <span
        class="badge"
        [class.badge--lost]="item.item_type === 'lost'"
        [class.badge--found]="item.item_type === 'found'"
      >
        {{ item.item_type === 'lost' ? 'Lost' : 'Found' }}
      </span>
      <span
        class="badge"
        [class.badge--active]="item.status === 'active'"
        [class.badge--resolved]="item.status === 'resolved'"
        [class.badge--claimed]="item.status === 'claimed'"
      >
        {{ item.status }}
      </span>
    </div>

    <h3 class="item-card__title">{{ item.title }}</h3>

    <p class="item-card__meta">
      <span class="item-card__category">
        <span class="item-card__icon" aria-hidden="true">📁</span>{{ item.category_name }}
      </span>
      <span class="item-card__location">
        <span class="item-card__icon" aria-hidden="true">📍</span>{{ item.location }}
      </span>
    </p>

    <p class="item-card__description">{{ truncatedDescription }}</p>

    <a [routerLink]="['/items', item.id]" class="item-card__link">Details →</a>
  </div>
</div>
