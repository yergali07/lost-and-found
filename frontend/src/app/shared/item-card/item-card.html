<div class="item-card">
  @if (item.image) {
    <img [src]="item.image" [alt]="item.title" class="item-card__image" />
  }

  <div class="item-card__body">
    <div class="item-card__badges">
      <span class="badge" [class.badge--lost]="item.item_type === 'lost'"
            [class.badge--found]="item.item_type === 'found'">
        {{ item.item_type === 'lost' ? 'Lost' : 'Found' }}
      </span>
      <span class="badge" [class.badge--active]="item.status === 'active'"
            [class.badge--resolved]="item.status === 'resolved'"
            [class.badge--claimed]="item.status === 'claimed'">
        {{ item.status }}
      </span>
    </div>

    <h3 class="item-card__title">{{ item.title }}</h3>

    <p class="item-card__meta">
      <span class="item-card__category">{{ item.category_name }}</span>
      <span class="item-card__location">{{ item.location }}</span>
    </p>

    <p class="item-card__description">{{ truncatedDescription }}</p>

    <a [routerLink]="['/items', item.id]" class="item-card__link">Подробнее →</a>
  </div>
</div>

<style>
  .item-card {
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    overflow: hidden;
    background: #fff;
    display: flex;
    flex-direction: column;
  }

  .item-card__image {
    width: 100%;
    height: 180px;
    object-fit: cover;
  }

  .item-card__body {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .item-card__badges {
    display: flex;
    gap: 8px;
  }

  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    text-transform: capitalize;
  }

  .badge--lost {
    background: #fce4ec;
    color: #c62828;
  }

  .badge--found {
    background: #e8f5e9;
    color: #2e7d32;
  }

  .badge--active {
    background: #e3f2fd;
    color: #1565c0;
  }

  .badge--resolved {
    background: #f3e5f5;
    color: #6a1b9a;
  }

  .badge--claimed {
    background: #fff3e0;
    color: #e65100;
  }

  .item-card__title {
    margin: 0;
    font-size: 18px;
  }

  .item-card__meta {
    margin: 0;
    font-size: 13px;
    color: #666;
    display: flex;
    gap: 12px;
  }

  .item-card__meta span::before {
    margin-right: 4px;
  }

  .item-card__category::before {
    content: '📁';
  }

  .item-card__location::before {
    content: '📍';
  }

  .item-card__description {
    margin: 0;
    font-size: 14px;
    color: #444;
  }

  .item-card__link {
    font-size: 14px;
    font-weight: 600;
    color: #1565c0;
    text-decoration: none;
    margin-top: 4px;
  }

  .item-card__link:hover {
    text-decoration: underline;
  }
</style>
